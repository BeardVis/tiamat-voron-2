#####################################################################
# 	Motherboard Fan Control
#####################################################################

[multi_pin motherboard_fans_pins]
pins: PF9, PF6

[fan_generic motherboard_fan]
pin: multi_pin:motherboard_fans_pins
max_power: 1.0

[delayed_gcode electronics_fan_control]
initial_duration: 2.0
gcode:
    UPDATE_DELAYED_GCODE ID=electronics_fan_control DURATION=5

    {% set x_driver = printer["tmc2240 stepper_x"] %}
    {% set y_driver = printer["tmc2240 stepper_y"] %}
    {% set printer_state = printer.idle_timeout.state %}
    {% set current_speed = (printer["fan_generic motherboard_fan"].speed | float) | round(2) %}
    
    {% set target_speed = 0.0 %}

    {% if printer_state == "Idle" %}
        # Do nothing if already idle to avoid resetting the idle timer
    {% else %}
        # Get maximum driver temperature
    {% set max_temp = 0.0 %}
    {% if x_driver.temperature is not none %}
        {% set max_temp = x_driver.temperature | float %}
    {% endif %}
    {% if y_driver.temperature is not none %}
        {% set y_temp = y_driver.temperature | float %}
        {% if y_temp > max_temp %}
            {% set max_temp = y_temp %}
        {% endif %}
    {% endif %}

    # Define thresholds
    {% set upper_threshold = 75.0 %}
    {% set lower_threshold = 65.0 %}
    {% set printing_speed = 0.85 %}
    {% set thermal_speed = 1.0 %}

    # Determine target speed based on temperature and state
    {% if max_temp > upper_threshold %}
        {% set target_speed = thermal_speed %}
    {% elif max_temp > lower_threshold and current_speed > 0 %}
        # Hysteresis: keep fan on if it's already on and temp is above lower threshold
        {% set target_speed = printing_speed %}
    {% elif printer_state == "Printing" %}
        {% set target_speed = printing_speed %}
    {% endif %}

    # Round target_speed for correct comparison
    {% set target_speed = target_speed | round(2) %}

    # Apply changes only if necessary
    {% if target_speed != current_speed %}
        # Only send the command if we are printing, if we are over-temp, 
        # OR if we are trying to turn the fan OFF after a print.
        # This allows the fan to turn off once, then stays silent so the idle timer can run.
        {% if printer_state == "Printing" or max_temp > upper_threshold or target_speed == 0.0 %}
            SET_FAN_SPEED FAN=motherboard_fan SPEED={target_speed}
            {action_respond_info("Motherboard fan speed changed from %s to %s (Max Driver Temp: %.1fC)" % (current_speed, target_speed, max_temp))}
        {% endif %}
    {% endif %}
    {% endif %}
