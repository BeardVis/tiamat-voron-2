[include stealthburner_leds.cfg]
[include head_status.cfg] # status config for BTT Knomi and head leds
[include cartographer3d.cfg]

[mcu EBBCan]
canbus_uuid: 7fff144e6274
canbus_interface: can0

[temperature_sensor EBBCan_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan:gpio28

[adxl345 accel_toolboard_t0]
cs_pin: EBBCan:gpio1
spi_software_sclk_pin: EBBCan:gpio2
spi_software_mosi_pin: EBBCan:gpio0
spi_software_miso_pin: EBBCan:gpio3
axes_map: z,-y,x

[resonance_tester]
accel_chip: adxl345 accel_toolboard_t0
probe_points: 
    150, 150, 20

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 32
rotation_distance: 21.5
gear_ratio: 50:10
nozzle_diameter: 0.400
full_steps_per_rotation: 200
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan:gpio27
control: pid
pid_Kp: 34.641
pid_Ki: 3.849
pid_Kd: 77.939
min_temp: 0
max_temp: 285
min_extrude_temp: 170
max_extrude_only_velocity: 60
max_extrude_only_distance: 200
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 999999

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 50.0
max_power: 1.0
kick_start_time: 0.5

[fan]
pin: EBBCan:gpio13
kick_start_time: 0.5

[filament_switch_sensor toolhead_sensor]
# FilamATrix D2F Switch
switch_pin: ^EBBCan:gpio24
pause_on_runout: False
runout_gcode:
  _SFS_PAUSE SENSOR="Toolhead (FilamATrix)"
insert_gcode:
  M117 Filament detected in Toolhead
