[mcu cartographer]
canbus_uuid: 2aab01843f86

[cartographer]
mcu: cartographer
x_offset: 0                          # Offset from nozzle to probe in X
y_offset: 22                         # Offset from nozzle to probe in Y
verbose: no                          # For extra output

[bed_mesh]
zero_reference_position: 150, 150    # The centre of your bed. 
speed: 300                           # Travel speed between points
horizontal_move_z: 3                 # Z height during travel
mesh_min: 5, 5                       # Minimum coordinates for mesh
mesh_max: 295, 263                   # Maximum coordinates for mesh (Y limited by offsets)
probe_count: 20, 20                  # Dense mesh for Cartographer
adaptive_margin: 10                  # Margin for adaptive mesh
mesh_pps: 0,0                        # Disable interpolation - mesh is dense enough

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345 accel_cartographer]
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345 accel_cartographer
probe_points:
    150, 150, 20
