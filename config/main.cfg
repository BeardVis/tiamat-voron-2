[gcode_macro _CLIENT_VARIABLE]
; source mainsail.cfg
variable_use_custom_pos   : True
variable_custom_park_x    : 150.0
variable_custom_park_y    : 300.0
variable_custom_park_dz   : 5.0
variable_retract          : 1.0
variable_cancel_retract   : 5.0
variable_park_at_cancel   : True
variable_use_fw_retract   : True
variable_idle_timeout     : 1800
gcode:

[include mainsail.cfg]
[include EBBSB2209.cfg]
[include hardware_checks.cfg]
[include macros.cfg]
[include tmc_autotune.cfg]
[include motherboard_fan_control.cfg]

[mcu]
canbus_uuid: 9ec3edca21f7
canbus_interface: can0 

[printer]
kinematics: corexy
max_velocity: 400
max_accel: 10000
max_z_velocity: 30
max_z_accel: 500
square_corner_velocity: 8.0

[temperature_sensor STM32_MCU]
sensor_type: temperature_mcu

[temperature_sensor CB1_Host]
sensor_type: temperature_host

[exclude_object]

[idle_timeout]
timeout: 1800
gcode:
  TURN_OFF_HEATERS
  M84                # Disable steppers
  SET_FAN_SPEED FAN=motherboard_fan SPEED=0.0 # Turn off electronics cooling
  STATUS_OFF         # Turn off toolhead LEDs
  {action_respond_info("Printer entered idle state")}

[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 0.5
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## Motor1 (B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 400
position_min: -2
position_endstop: 300
position_max: 300
homing_speed: 80  #Max 100
homing_positive_dir: true

# Sensorless homing settings for Y axis
endstop_pin: tmc2240_stepper_x:virtual_endstop
homing_retract_dist: 0

[tmc2240 stepper_x]
run_current: 1.1
cs_pin: PC13
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
stealthchop_threshold: 0

# Sensorless homing settings for X axis
diag0_pin: ^!PF4
# StallGuard4 Sensitivity (-64 to 63). Configured in tmc_autotune.cfg
# driver_SGT: 2

## Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 400
position_min: -2
position_endstop: 300
position_max: 300
homing_speed: 80   #Max 100
homing_positive_dir: true

# Sensorless homing settings for Y axis
endstop_pin: tmc2240_stepper_y:virtual_endstop
homing_retract_dist: 0

[tmc2240 stepper_y]
run_current: 1.1
cs_pin: PE3
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
stealthchop_threshold: 0

# Sensorless homing settings for Y axis
diag0_pin: ^!PF3
# StallGuard4 Sensitivity (-64 to 63). Configured in tmc_autotune.cfg
# driver_SGT: 2

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 290
position_min: -5
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: .6
sense_resistor: 0.110

##	Z1 Stepper - Rear Left on Motor4
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: true
run_current: .6
sense_resistor: 0.110

##	Z2 Stepper - Rear Right on Motor5
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: true
run_current: .6
sense_resistor: 0.110

##	Z3 Stepper - Front Right on Motor6
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: true
run_current: .6
sense_resistor: 0.110

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA1 ## SSR
sensor_type: Generic 3950
sensor_pin: PB1
max_power: 1
min_temp: 0
max_temp: 120

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[quad_gantry_level]
##	Use QUAD_GANTRY_LEVEL to level a gantry.
gantry_corners:
    -61,-7
    357,368
points:
	30,8
	30,248
	270,248
	270,8

speed: 200
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.0075
max_adjust: 10

[gcode_macro T0]
gcode:

[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  STATUS_HOMING
  SET_GCODE_VARIABLE MACRO=_KNOMI_STATUS VARIABLE=homing VALUE=True

  # --- Current settings ---
  {% set HOME_CUR = 0.600 %}
  {% set RUN_CUR_X = printer.configfile.settings['tmc2240 stepper_x'].run_current %}
  {% set RUN_CUR_Y = printer.configfile.settings['tmc2240 stepper_y'].run_current %}

  # --- Safe Z lift ---
  {% if home_all or ('X' in params and 'Y' in params) %}
    # Fake XY only when homing both — safe to override position
    SET_KINEMATIC_POSITION X=150 Y=150 Z=20
  {% else %}
    # Z-only home: preserve real XY, only fake Z height
    SET_KINEMATIC_POSITION Z=20
  {% endif %}
  G91
  G1 Z15 F1200
  G90

  {% if home_all or 'X' in params or 'Y' in params %}
    # Lower XY current for sensorless detection
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR}
    G4 P500             # Brief settle after current change
  {% endif %}

  # --- Home X ---
  {% if home_all or 'X' in params %}
    G28 X
    G91
    G1 X-10 F1200       # Back off endstop
    G90
    G4 P1000            # StallGuard settle before next axis
  {% endif %}

  # --- Home Y ---
  {% if home_all or 'Y' in params %}
    G28 Y
    G91
    G1 Y-10 F1200       # Back off endstop
    G90
    G4 P1000            # StallGuard settle
  {% endif %}

  # --- Restore XY current immediately after XY homing ---
  {% if home_all or 'X' in params or 'Y' in params %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR_Y}
    G4 P500             # Allow drivers to stabilize at run current
  {% endif %}

  # --- Home Z (TAP / Z-endstop at center) ---
  {% if home_all or 'Z' in params %}
    G90
    G0 X150 Y150 F9000  # Move to center for Z probe
    G28 Z
    G0 Z10 F3000        # Lift after Z home
  {% endif %}

  SET_GCODE_VARIABLE MACRO=_KNOMI_STATUS VARIABLE=homing VALUE=False
  STATUS_READY

[filament_switch_sensor switch_sensor]
switch_pin: ^PF0
pause_on_runout: False
runout_gcode:
  _SFS_PAUSE SENSOR="Switch"
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor encoder_sensor]
switch_pin: ^PC15
detection_length: 7.0 # reason: Increased from 3.0 to reduce false positives during multi-part prints with frequent retractions
extruder: extruder
pause_on_runout: False
runout_gcode:
  _SFS_PAUSE SENSOR="Encoder"
insert_gcode:
  M117 Filament encoder inserted

[temperature_sensor Cabinet_T_&_RH]
sensor_type: AHT3X
i2c_software_scl_pin: PA8
i2c_software_sda_pin: PC9
aht10_report_time: 5
