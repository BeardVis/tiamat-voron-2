[gcode_macro LOAD_FILAMENT]
description: Loads filament into the extruder
gcode:
  {% set temp = params.TEMP|default(230)|int %}

  {% if printer["filament_switch_sensor toolhead_sensor"].filament_detected %}
    {action_respond_info("Filament already loaded in the toolhead. Aborting load.")}
    M117 Filament already loaded
  {% else %}
    _SFS_DISABLE
    SAVE_GCODE_STATE NAME=load_state
    M117 Loading Filament...
    M109 S{temp}                   # M109 is overridden in head_status.cfg to handle LEDs/Knomi

    STATUS_BUSY
    G91
    G92 E0
    G1 E50 F300                    # Fast load
    G1 E50 F150                    # Purge
    G1 E-2.0 F2400                 # Retract to avoid leaking
    G92 E0
    M400

    M117 Filament Loaded
    STATUS_READY
    RESTORE_GCODE_STATE NAME=load_state
  {% endif %}

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from the extruder
gcode:
  {% set temp = params.TEMP|default(230)|int %}

  {% if not printer["filament_switch_sensor toolhead_sensor"].filament_detected %}
    {action_respond_info("No filament detected in the toolhead. Aborting unload.")}
    M117 No filament detected
  {% else %}
    _SFS_DISABLE
    SAVE_GCODE_STATE NAME=unload_state
    M117 Unloading Filament...
    M109 S{temp}                   # M109 is overridden in head_status.cfg to handle LEDs/Knomi

    STATUS_BUSY
    G91
    G92 E0
    G1 E10 F150                    # Purge a bit before unloading
    G1 E-100 F1200                  # Retract filament completely
    G92 E0
    M400

    M117 Filament Unloaded
    STATUS_READY
    RESTORE_GCODE_STATE NAME=unload_state
  {% endif %}

[gcode_macro _SFS_ENABLE]
description: Enable Smart Filament Sensor and FilamATrix
gcode:
    SET_FILAMENT_SENSOR SENSOR=switch_sensor ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=toolhead_sensor ENABLE=1
    {action_respond_info("SFS & FilamATrix Enabled")}

[gcode_macro _SFS_DISABLE]
description: Disable Smart Filament Sensor and FilamATrix
gcode:
    SET_FILAMENT_SENSOR SENSOR=switch_sensor ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=toolhead_sensor ENABLE=0
    {action_respond_info("SFS & FilamATrix Disabled")}

[gcode_macro _SFS_PAUSE]
description: Pause with SFS reason
gcode:
    {% set sensor = params.SENSOR|default("Unknown") %}
    RESPOND TYPE=error MSG='{"SFS Runout detected by %s" % sensor}'
    PAUSE

[gcode_macro PRINT_START]
gcode:
    # 1. Parameter Initialization & Sanity Checks
    {% set BED = params.BED|default(60)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(200)|float %}
    
    # Slicer-passed bounds for Adaptive Mesh
    {% set print_min = params.PRINT_MIN|default("20,20") %}
    {% set print_max = params.PRINT_MAX|default("280,280") %}

    # Cartographer-specific Mesh Parameters
    {% set mesh_method = params.METHOD|default("scan") %}
    {% set mesh_path = params.PATH|default("snake") %}
    {% set mesh_speed = params.SPEED|default(300.0)|float %}
    {% set mesh_height = params.HEIGHT|default(4.0)|float %}
    {% set mesh_adaptive = params.ADAPTIVE|default(1)|int %}

    _SFS_DISABLE # Disable SFS during start routine to avoid false triggers
    {action_respond_info("Starting Print: BED=%.1f, EXTRUDER=%.1f" % (BED, EXTRUDER))}
    
    # 2. Preparation
    G21 ; set units to millimeters
    G90 ; use absolute coordinates
    M83 ; use relative extrusion
    
    # 3. Start heating (Non-blocking)
    STATUS_HEATING
    M117 Preheating...
    M140 S{BED}
    M104 S150 ; Preheat extruder to 150 to avoid oozing during leveling
    SET_GCODE_OFFSET Z=0 ; Reset Z offset

    # 4. Homing
    M117 Homing...
    HOME_LAZY
    
    # 5. Wait for Bed Temperature
    M117 Heating Bed...
    M190 S{BED}
    
    # 6. Leveling and Mesh
    BED_MESH_CLEAR
    {% if printer.quad_gantry_level.applied == False %}
        QUAD_GANTRY_LEVEL
    {% endif %}

    M109 S150 ; wait for hotend to reach 150C

    CARTOGRAPHER_TOUCH_HOME ; Home for real Z0 using Cartographer Touch

    # 7. Preheat extruder during the Bed mesh calibrate
    M117 Preating Extruder...
    M104 S{EXTRUDER}

    # 8. Mesh at actual print temperature
    M117 Calibrating Mesh...
    BED_MESH_CALIBRATE METHOD={mesh_method} ADAPTIVE={mesh_adaptive} MESH_MIN={print_min} MESH_MAX={print_max} PATH={mesh_path} SPEED={mesh_speed} HEIGHT={mesh_height}

    M117 Heating Extruder...
    M109 S{EXTRUDER}
    
    # 9. Prime Line
    {% set prime_x = 10.0 %}
    {% set prime_y = 4.0 %}
    {% set prime_length = 140.0 %}
    
    M117 Priming...
    STATUS_BUSY
    G90
    G0 X{prime_x} Y{prime_y} Z5 F10000
    G0 Z0.4 F3000
    G92 E0
    G1 X{prime_x + prime_length} E20 F1000 # Purge line
    G92 E0
    
    _SFS_ENABLE # Enable SFS just before printing
    M117 Printing...
    STATUS_PRINTING

[gcode_macro PRINT_END]
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    _SFS_DISABLE # Disable SFS after print
    STATUS_BUSY
    
    M400
    G92 E0
    G1 E-5.0 F3600
    
    TURN_OFF_HEATERS
    M107
    BED_MESH_CLEAR
    
    # Macros from mainsail.cfg
    _TOOLHEAD_PARK_PAUSE_CANCEL Z_MIN=50
    
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0
    
    STATUS_READY
    {action_respond_info("Print finished successfully")}

[gcode_macro HOME_LAZY]
description: Homes only unhomed axes, but always re-homes Z for safety.
gcode:
  {% set homed = printer.toolhead.homed_axes|upper %}
  {% set axes_to_home = 'XYZ'|reject('in', homed)|join('') %}
  
  # Ensure Z is always homed (typical Voron safety preference)
  {% if 'Z' not in axes_to_home %}
    {% set axes_to_home = axes_to_home + 'Z' %}
  {% endif %}

  {action_respond_info("Lazy homing axes: " ~ axes_to_home)}
  
  G28 {axes_to_home}
  M400 # Wait for moves to finish

# Usage: PID_TUNE_EXTRUDER [HEATER=[extruder|heater_bed]] [TARGET=<targetTemperature>]
[gcode_macro PID_TUNE_EXTRUDER]
#variable_targetTemperature: { 'Value': 220}
#gcode:
#  PID_CALIBRATE HEATER={params.HEATER|default(extruder)} TARGET={params.TARGET|default(targetTemperature.Value)}
gcode:
  PID_CALIBRATE HEATER=extruder TARGET={params.TARGET|default(220)}

[gcode_macro PID_TUNE_BED]
gcode:
  PID_CALIBRATE HEATER=heater_bed TARGET={params.TARGET|default(70)}

[gcode_macro CUT_FILAMENT]
description: Manual filament cut procedure for FilamATrix
gcode:
  _TOOLHEAD_PARK_PAUSE_CANCEL Z_MIN=50
  M117 CUT FILAMENT NOW!
  PAUSE
  M117 Please actuate the FilamATrix cutter manually.
  {action_respond_info("FilamATrix manual cut requested. PAUSED.")}

[gcode_macro ADXL_TUNE]
description: Runs resonance testing for both axes
gcode:
  M117 Tuning Input Shaper...
  HOME_LAZY
  
  M117 Testing X (EBB)...
  SHAPER_CALIBRATE AXIS=X
  
  M117 Testing Y (Cartographer)...
  SHAPER_CALIBRATE AXIS=Y
  
  M117 Resonance testing complete.
  SAVE_CONFIG
