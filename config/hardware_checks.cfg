[gcode_macro TEST_RESONANCES_X]
description: Run resonance test on X axis
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    SHAPER_CALIBRATE AXIS=X

[gcode_macro TEST_RESONANCES_Y]
description: Run resonance test on Y axis
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    SHAPER_CALIBRATE AXIS=Y

[gcode_macro CHECK_AXES_CONFIG]
description: Quick check of all stepper configurations
gcode:
    QUERY_STEPPERS
    GET_POSITION
